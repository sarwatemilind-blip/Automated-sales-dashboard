name: Build and Deploy to Main Branch Root

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'index.html'
      - '404.html'
      - '_next/**'
      - '.nojekyll'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Copy build files to root & add .nojekyll
        run: |
          cp -r out/* .
          touch .nojekyll

      - name: Commit and Push built files back to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Deploy built static files to root [skip ci]"
          git push origin main
